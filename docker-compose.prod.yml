# Stack BACKEND de production Clutch — 3 briques : api / worker / db.
# (Le front est déployé séparément sur Cloudflare Pages. Auth = Supabase JWT.)
#
# Lancement sur le VPS :
#   cp .env.prod.example .env   # puis remplir les secrets
#   docker compose -f docker-compose.prod.yml -f docker-compose.tunnel.yml up -d --build
#
# Docker Compose charge automatiquement ".env" pour la substitution ${...}
# ET comme env_file des conteneurs.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./clutch-backend
    restart: unless-stopped
    # Migrations Alembic PUIS serveur. --proxy-headers : l'API est derrière le
    # tunnel (HTTPS terminé à l'edge). L'API ne parle jamais à Liquipedia.
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      --proxy-headers --forwarded-allow-ips='*'"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # Publié sur la loopback uniquement : joignable par le tunnel (cloudflared
    # via le réseau Compose, ou Tailscale Funnel via 127.0.0.1), jamais exposé
    # directement à un réseau public.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./clutch-backend
    restart: unless-stopped
    # Ingestion Liquipedia → catalog uniquement. ⚠️ NE JAMAIS scaler ce service
    # (rate limit Liquipedia : 60 req/h ; une seule instance autorisée).
    command: python -m ingestion.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  pgdata:
