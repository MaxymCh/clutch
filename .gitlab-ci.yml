# CI/CD Clutch — GitLab. Deux temps :
#   1) test   : lint + tests back/front à chaque push/MR (qualité).
#   2) deploy : sur "main", déploiement local sur le runner installé sur le VPS.
#
# Variable CI/CD à définir (Settings → CI/CD → Variables) :
#   DEPLOY_PATH = chemin du clone sur le VPS (ex: /home/chape_m/group-1076817)
# Le runner "vps" (executor shell) tourne SUR le VPS : il déploie en local,
# donc plus aucun SSH ni accès réseau externe nécessaire.

stages:
  - test
  - deploy

# Les tests tournent dans des conteneurs root (runner shell) → des fichiers
# root sont créés dans le dossier de build. On désactive le `git clean`
# automatique de GitLab (sinon "permission denied" au pipeline suivant).
variables:
  GIT_CLEAN_FLAGS: none

# --- Qualité backend -------------------------------------------------------
# Runner "shell" sur le VPS : les jobs tournent sur l'hôte (pas de pip/node).
# On exécute donc les tests DANS un conteneur Docker lancé par le runner.
test:backend:
  stage: test
  tags:
    - vps
  script:
    - >
      docker run --rm -v "$CI_PROJECT_DIR:/src" -w /src/clutch-backend python:3.12-slim
      sh -c "pip install --no-cache-dir -e '.[dev]' && ruff check . && pytest"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# --- Qualité frontend ------------------------------------------------------
test:frontend:
  stage: test
  tags:
    - vps
  script:
    - >
      docker run --rm -v "$CI_PROJECT_DIR:/src" -w /src/clutch-frontend node:22-alpine
      sh -c "npm ci && npm run lint && npm run build"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# --- Déploiement du BACKEND sur le VPS (uniquement sur main) ----------------
# Le FRONTEND est déployé par Cloudflare Pages (build auto sur push) — pas ici.
# Ce job tourne sur le runner "vps" (executor shell installé sur le VPS) : il
# se contente de mettre à jour le clone local et de relancer la stack Docker.
# Le dossier $DEPLOY_PATH contient le .env de prod (jamais versionné).
deploy:backend:
  stage: deploy
  tags:
    - vps                       # cible le runner installé sur le VPS
  script:
    - cd "$DEPLOY_PATH"
    # Auth via le token de job CI (pas de secret à stocker) + reset propre
    # sur main pour éviter tout conflit de merge sur le clone du VPS.
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin
    - git reset --hard origin/main
    - docker compose -f docker-compose.prod.yml -f docker-compose.tunnel.yml up -d --build
    - docker image prune -f
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
    url: https://api.clutch-esports.eu
